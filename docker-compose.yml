services:
  backend:
    build:
      context: ./backend
    environment:
      PORT: "8080"
      ALLOWED_ORIGINS: "http://localhost:3000"
      SECSCAN_SCAN_TIMEOUT: "45s"
      SECSCAN_ENABLE_ACTIVE_PROBES: "false"
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: "http://backend:8080"
    ports:
      - "3000:3000"
    depends_on:
      - backend
